- title: Sympolymathesy, by Chris Krycho
  url: https://v5.chriskrycho.com/
  rss_url: https://v5.chriskrycho.com/feed.json
  note:
    Chris writes about all sorts of topics—programming, technology, faith,
    music, photography. His site reflects his varied interests. His words are
    full of truth and hope.

- title: Daring Fireball
  url: https://daringfireball.net/
  rss_url: https://daringfireball.net/feeds/main
  note:
    John Gruber's thoughts on tech (mostly Apple) and other things. As an avid
    Apple user, I really appreciate his take. He's not afraid to call out when
    Apple gets something wrong (and has been punished by the Apple PR department
    for it), but he also happily sings Apple's praises when they get it _right_.

- title: Theme Park Insider
  url: https://www.themeparkinsider.com/
  rss_url: https://www.themeparkinsider.com/news/rss.xml
  note:
    Robert Niles curates news about all theme parks, not just Disney and
    Universal. This is the best source for non-Disney theme park news, and maybe
    the most impartial source for Disney news too. The discussion on articles
    and in the forums is insightful and friendly; and feels like a last vestige
    of a bygone era of online communities.

- title: Yesterland
  url: https://www.yesterland.com/
  rss_url: https://github.com/philtr/yesterland-feed
  note:
    Werner Weiss has been curating this wonderful website for over 30 years. A
    "labor of love," filled with wonderful photographs and stories that archive
    the attractions, restaurants, and lands that are no longer to be found at
    Disney parks worldwide.

- title: xkcd
  url: https://xkcd.com/
  rss_url: https://xkcd.com/atom.xml
  note:
    Comics for nerds. Usually funny, sometimes absurd, sometimes poignant, and
    more often than not, over my head.

- title: Tangle
  url: https://www.readtangle.com/
  rss_url: https://www.readtangle.com/archive/rss/
  note:
    Tangle is political news. I'm not big into politics, and I hate the spin
    that major news outlets put on their stories. Each day, Tangle picks one
    major story, gives you the facts as unbiasedly as possible, and will tell
    you what both sides are saying before weighing in with their own opinions.

- title: datagubbe - Carl Svensson
  url: https://www.datagubbe.se
  rss_url: https://www.datagubbe.se/atom.xml
  note:
    Retro computing, demoscene, Amiga stuff, pixel art, and general computing
    nostalgia.

