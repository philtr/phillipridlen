  note:
    Shots from the hip of the Dane of the wild West, the creator of Ruby on
    Rails, better known as DHH. Tech, politics, Linux, 🇩🇰&nbsp;Denmark, culture,
    AI—you know what DHH has been thinking about lately because it's on his
    blog.

- title: Jason Fried
